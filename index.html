<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bot Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 8px;
            margin-left: -8px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--tg-theme-button-color);
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .main-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .toast {
            background: #00a884;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 16px;
            animation: fadeOut 2s ease forwards;
        }
        .toast.error {
            background: #e53935;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        .employee-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .employee-item {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .employee-name {
            flex: 1;
        }
        .delete-btn {
            background: #e53935;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .empty-list {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .gold-balance {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #D4AF37;
        }
        .balance-label {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 8px;
        }
        .refresh-balance-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 4px 8px;
            border-radius: 8px;
        }
        .refresh-balance-btn:hover {
            background: var(--tg-theme-secondary-bg-color);
        }
        .error-msg {
            color: #e53935;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Main Page -->
    <div id="mainPage">
        <div class="header">
            <div></div>
            <div class="page-title">Control Panel</div>
            <div style="width: 32px;"></div>
        </div>
        <div class="main-buttons">
            <button class="main-btn" onclick="showPage('addPage')">➕ ADD</button>
            <button class="main-btn" onclick="showPage('employeesPage')">👥 EMPLOYEES</button>
            <button class="main-btn" onclick="openCommissionPage()">💰 COMMISSIONS</button>
            <button class="main-btn" onclick="openGoldSalePage()">🪙 GOLD SALE</button>
        </div>
    </div>

    <!-- Add Bot Record Page -->
    <div id="addPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Add Bot Record</div>
            <div style="width: 32px;"></div>
        </div>
        <form id="addForm">
            <div class="form-group">
                <label>Kingdom (K)</label>
                <input type="text" id="kingdom" placeholder="Enter kingdom name" required>
            </div>
            <div class="form-group">
                <label>Alliance Name</label>
                <input type="text" id="alliance" placeholder="Enter alliance name" required>
            </div>
            <div class="form-group">
                <label>Number of Bots</label>
                <input type="number" id="bots" placeholder="Number of bots" min="0" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="price" placeholder="Price" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                    <option value="paypal">PayPal</option>
                    <option value="russia">Russia</option>
                    <option value="usdt">USDT</option>
                    <option value="gold">Gold</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('addForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="addToast"></div>
    </div>

    <!-- Employees Page -->
    <div id="employeesPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Employees</div>
            <div style="width: 32px;"></div>
        </div>
        <div id="employeesList" class="employee-list"></div>
        <form id="employeeForm">
            <div class="form-group">
                <label>Add New Employee</label>
                <input type="text" id="employeeName" placeholder="Enter employee name" required autofocus>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('employeeForm')">Clear</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="employeeToast"></div>
    </div>

    <!-- Commissions Page -->
    <div id="commissionPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Commissions</div>
            <div style="width: 32px;"></div>
        </div>
        <form id="commissionForm">
            <div class="form-group">
                <label>Employee</label>
                <select id="commissionEmployee" required>
                    <option value="">Select employee...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="commissionAmount" placeholder="Enter amount" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Note (Optional)</label>
                <textarea id="commissionNote" placeholder="Enter notes..."></textarea>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('commissionForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="commissionToast"></div>
    </div>

    <!-- Gold Sale Page -->
    <div id="goldSalePage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Sell Gold</div>
            <div style="width: 32px;"></div>
        </div>
        
        <div class="gold-balance">
            <button class="refresh-balance-btn" onclick="refreshGoldBalance()" title="Refresh from Excel">🔄</button>
            <div class="balance-label">Current Gold Balance</div>
            <div class="balance-amount" id="goldBalance">0</div>
        </div>
        
        <form id="goldSaleForm">
            <div class="form-group">
                <label>Amount to Sell</label>
                <input type="number" id="goldAmount" placeholder="Enter amount" min="0" step="1" required>
                <div id="amountError" class="error-msg" style="display: none;"></div>
            </div>
            <div class="form-group">
                <label>Price (USD)</label>
                <input type="number" id="goldPrice" placeholder="Enter price" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="goldPayment">
                    <option value="paypal">PayPal</option>
                    <option value="russia">Russia</option>
                    <option value="usdt">USDT</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Note (Optional)</label>
                <textarea id="goldNote" placeholder="Enter notes..."></textarea>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('goldSaleForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Sell</button>
            </div>
        </form>
        <div id="goldToast"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        let employees = [];
        let goldBalance = 0;
        
        // Load from localStorage
        try {
            employees = JSON.parse(localStorage.getItem('employees') || '[]');
            goldBalance = parseInt(localStorage.getItem('goldBalance') || '0');
        } catch(e) {
            employees = [];
            goldBalance = 0;
        }
        
        function saveEmployees() {
            localStorage.setItem('employees', JSON.stringify(employees));
        }
        
        function saveGoldBalance() {
            localStorage.setItem('goldBalance', goldBalance.toString());
            const balanceEl = document.getElementById('goldBalance');
            if (balanceEl) {
                balanceEl.textContent = goldBalance.toLocaleString();
            }
        }
        
        function updateEmployeesList() {
            const container = document.getElementById('employeesList');
            if (!container) return;
            
            if (employees.length === 0) {
                container.innerHTML = '<div class="empty-list">📭 No employees yet</div>';
                return;
            }
            let html = '';
            employees.forEach((name, index) => {
                html += `
                    <div class="employee-item">
                        <span class="employee-name">👤 ${escapeHtml(name)}</span>
                        <button class="delete-btn" onclick="deleteEmployee('${escapeHtml(name)}', ${index})">Delete</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function deleteEmployee(name, index) {
            if (confirm(`Delete employee "${name}"?`)) {
                employees.splice(index, 1);
                saveEmployees();
                updateEmployeesList();
                updateCommissionDropdown();
                tg.sendData(JSON.stringify({ action: 'delete_employee', name: name }));
                showToast('employeeToast', `✅ Employee "${escapeHtml(name)}" deleted!`);
            }
        }
        
        function updateCommissionDropdown() {
            const select = document.getElementById('commissionEmployee');
            if (!select) return;
            
            if (employees.length === 0) {
                select.innerHTML = '<option value="">No employees available</option>';
                return;
            }
            let options = '<option value="">Select employee...</option>';
            employees.forEach(name => {
                options += `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
            });
            select.innerHTML = options;
        }
        
        function refreshGoldBalance() {
            const balanceEl = document.getElementById('goldBalance');
            balanceEl.textContent = 'Loading...';
            tg.sendData(JSON.stringify({ action: 'get_gold_balance' }));
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showPage(pageId) {
            const pages = ['mainPage', 'addPage', 'employeesPage', 'commissionPage', 'goldSalePage'];
            pages.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(pageId);
            if (target) target.classList.remove('hidden');
            
            if (pageId === 'employeesPage') {
                updateEmployeesList();
                setTimeout(() => {
                    const input = document.getElementById('employeeName');
                    if (input) input.focus();
                }, 100);
            }
            if (pageId === 'commissionPage') {
                updateCommissionDropdown();
            }
            if (pageId === 'goldSalePage') {
                const balanceEl = document.getElementById('goldBalance');
                balanceEl.textContent = goldBalance.toLocaleString();
            }
        }
        
        function openCommissionPage() {
            showPage('commissionPage');
        }
        
        function openGoldSalePage() {
            showPage('goldSalePage');
        }
        
        function clearForm(formId) {
            const form = document.getElementById(formId);
            if (form) form.reset();
            const errorDiv = document.getElementById('amountError');
            if (errorDiv) errorDiv.style.display = 'none';
        }
        
        function showToast(containerId, message, isError = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast';
            if (isError) toast.classList.add('error');
            
            container.innerHTML = '';
            container.appendChild(toast);
            
            setTimeout(() => {
                if (container.firstChild === toast) {
                    container.innerHTML = '';
                }
            }, 2000);
        }
        
        // Receive data from bot
        tg.onEvent('message', function(msg) {
            try {
                const data = JSON.parse(msg);
                if (data.type === 'gold_balance') {
                    goldBalance = data.balance;
                    saveGoldBalance();
                    const balanceEl = document.getElementById('goldBalance');
                    if (balanceEl) {
                        balanceEl.textContent = goldBalance.toLocaleString();
                    }
                    showToast('goldToast', `✅ Balance updated: ${goldBalance.toLocaleString()} gold`);
                }
            } catch(e) {
                // Not JSON, ignore
            }
        });
        
        // Add bot record
        const addForm = document.getElementById('addForm');
        if (addForm) {
            addForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const kingdom = document.getElementById('kingdom')?.value || '';
                const alliance = document.getElementById('alliance')?.value || '';
                const bots = parseInt(document.getElementById('bots')?.value || '0');
                const price = parseFloat(document.getElementById('price')?.value || '0');
                const payment = document.getElementById('payment')?.value || '';
                
                if (!kingdom || !alliance || isNaN(bots) || isNaN(price)) {
                    showToast('addToast', 'Please fill all fields', true);
                    return;
                }
                
                // If payment is gold, update local gold balance
                if (payment === 'gold') {
                    goldBalance += price;
                    saveGoldBalance();
                }
                
                tg.sendData(JSON.stringify({
                    action: 'add_bot_record',
                    kingdom: kingdom,
                    alliance: alliance,
                    bots: bots,
                    price: price,
                    payment: payment
                }));
                
                clearForm('addForm');
                tg.close();
            });
        }
        
        // Add employee
        const employeeForm = document.getElementById('employeeForm');
        if (employeeForm) {
            employeeForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('employeeName')?.value.trim();
                
                if (!name) {
                    showToast('employeeToast', 'Please enter employee name', true);
                    return;
                }
                
                if (!employees.includes(name)) {
                    employees.push(name);
                    saveEmployees();
                    updateEmployeesList();
                    updateCommissionDropdown();
                    
                    tg.sendData(JSON.stringify({ action: 'add_employee', name: name }));
                    showToast('employeeToast', `✅ Employee "${escapeHtml(name)}" added!`);
                    clearForm('employeeForm');
                    
                    const input = document.getElementById('employeeName');
                    if (input) input.focus();
                } else {
                    showToast('employeeToast', `❌ Employee "${escapeHtml(name)}" already exists!`, true);
                }
            });
        }
        
        // Add commission
        const commissionForm = document.getElementById('commissionForm');
        if (commissionForm) {
            commissionForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const employee = document.getElementById('commissionEmployee')?.value;
                const amount = parseFloat(document.getElementById('commissionAmount')?.value || '0');
                const note = document.getElementById('commissionNote')?.value || '';
                
                if (!employee) {
                    showToast('commissionToast', 'Please select an employee', true);
                    return;
                }
                if (!amount || amount <= 0) {
                    showToast('commissionToast', 'Please enter a valid amount', true);
                    return;
                }
                
                tg.sendData(JSON.stringify({
                    action: 'add_commission',
                    employee: employee,
                    amount: amount,
                    note: note
                }));
                
                showToast('commissionToast', `✅ Commission for ${escapeHtml(employee)} added!`);
                clearForm('commissionForm');
                
                const select = document.getElementById('commissionEmployee');
                if (select) select.value = '';
                document.getElementById('commissionAmount')?.focus();
            });
        }
        
        // Gold Sale
        const goldSaleForm = document.getElementById('goldSaleForm');
        if (goldSaleForm) {
            goldSaleForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const amount = parseInt(document.getElementById('goldAmount')?.value || '0');
                const price = parseFloat(document.getElementById('goldPrice')?.value || '0');
                const payment = document.getElementById('goldPayment')?.value;
                const note = document.getElementById('goldNote')?.value || '';
                
                if (!amount || amount <= 0) {
                    showToast('goldToast', 'Please enter a valid amount', true);
                    return;
                }
                if (amount > goldBalance) {
                    const errorDiv = document.getElementById('amountError');
                    if (errorDiv) {
                        errorDiv.textContent = `Insufficient balance! Available: ${goldBalance.toLocaleString()}`;
                        errorDiv.style.display = 'block';
                    }
                    return;
                }
                if (!price || price <= 0) {
                    showToast('goldToast', 'Please enter a valid price', true);
                    return;
                }
                
                // Update local balance
                goldBalance -= amount;
                saveGoldBalance();
                
                tg.sendData(JSON.stringify({
                    action: 'add_gold_sale',
                    amount: amount,
                    price: price,
                    payment: payment,
                    note: note
                }));
                
                showToast('goldToast', `✅ Sold ${amount.toLocaleString()} gold for $${price}!`);
                clearForm('goldSaleForm');
            });
        }
        
        // Initial load
        updateEmployeesList();
        updateCommissionDropdown();
        const balanceEl = document.getElementById('goldBalance');
        if (balanceEl) balanceEl.textContent = goldBalance.toLocaleString();
    </script>
</body>
</html>
