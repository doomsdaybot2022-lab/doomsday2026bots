<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Management System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 8px;
            margin-left: -8px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus {
            border-color: var(--tg-theme-button-color);
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }
        
        .btn:active {
            opacity: 0.7;
        }
        
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        
        .main-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Main Menu Page -->
    <div id="mainPage">
        <div class="header">
            <div></div>
            <div class="page-title">Bot Management</div>
            <div style="width: 32px;"></div>
        </div>
        <div class="main-buttons">
            <button class="main-btn" onclick="showPage('addPage')">➕ ADD</button>
            <button class="main-btn" onclick="showPage('listPage')">📋 LIST</button>
            <button class="main-btn" onclick="showPage('statsPage')">📊 STATS</button>
        </div>
    </div>

    <!-- Add Record Page -->
    <div id="addPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Add New Record</div>
            <div style="width: 32px;"></div>
        </div>
        
        <form id="addForm">
            <div class="form-group">
                <label>Kingdom (K)</label>
                <input type="text" id="kingdom" placeholder="Enter kingdom name" required>
            </div>
            
            <div class="form-group">
                <label>Alliance Name</label>
                <input type="text" id="alliance" placeholder="Enter alliance name" required>
            </div>
            
            <div class="form-group">
                <label>Number of Bots</label>
                <input type="number" id="bots" placeholder="Enter number of bots" min="0" required>
            </div>
            
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="price" placeholder="Enter price" min="0" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                    <option value="paypal">PayPal</option>
                    <option value="russia">Russia</option>
                    <option value="usdt">USDT</option>
                    <option value="gold">Gold</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <!-- List Page (coming next) -->
    <div id="listPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Records List</div>
            <div style="width: 32px;"></div>
        </div>
        <div id="listContent">Loading...</div>
    </div>

    <!-- Stats Page (coming next) -->
    <div id="statsPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Statistics</div>
            <div style="width: 32px;"></div>
        </div>
        <div id="statsContent">Loading...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        function showPage(pageId) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('addPage').classList.add('hidden');
            document.getElementById('listPage').classList.add('hidden');
            document.getElementById('statsPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            
            if (pageId === 'listPage') {
                loadList();
            } else if (pageId === 'statsPage') {
                loadStats();
            }
        }
        
        function clearForm() {
            document.getElementById('addForm').reset();
        }
        
        // Handle form submission
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                action: 'add_record',
                kingdom: document.getElementById('kingdom').value,
                alliance: document.getElementById('alliance').value,
                bots: parseInt(document.getElementById('bots').value),
                price: parseFloat(document.getElementById('price').value),
                payment: document.getElementById('payment').value
            };
            
            tg.sendData(JSON.stringify(data));
            
            // Show success and clear
            tg.showPopup({
                title: 'Success',
                message: 'Record saved successfully!',
                buttons: [{type: 'ok'}]
            });
            
            clearForm();
        });
        
        function loadList() {
            tg.sendData(JSON.stringify({action: 'get_list'}));
        }
        
        function loadStats() {
            tg.sendData(JSON.stringify({action: 'get_stats'}));
        }
        
        // Receive data from bot
        window.receiveData = function(data) {
            if (data.type === 'list') {
                displayList(data.content);
            } else if (data.type === 'stats') {
                displayStats(data.content);
            }
        };
        
        function displayList(records) {
            const container = document.getElementById('listContent');
            if (!records || records.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">No records found</div>';
                return;
            }
            
            let html = '';
            records.forEach(record => {
                html += `
                    <div style="background: var(--tg-theme-secondary-bg-color); border-radius:12px; padding:12px; margin-bottom:12px;">
                        <div><strong>Kingdom:</strong> ${record.kingdom}</div>
                        <div><strong>Alliance:</strong> ${record.alliance}</div>
                        <div><strong>Bots:</strong> ${record.bots}</div>
                        <div><strong>Price:</strong> $${record.price}</div>
                        <div><strong>Payment:</strong> ${record.payment}</div>
                        <div><strong>Date:</strong> ${record.date}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function displayStats(stats) {
            const container = document.getElementById('statsContent');
            container.innerHTML = `
                <div style="background: var(--tg-theme-secondary-bg-color); border-radius:12px; padding:16px; margin-bottom:12px;">
                    <h3>Summary</h3>
                    <div>Total Records: ${stats.total_records}</div>
                    <div>Total Bots: ${stats.total_bots}</div>
                    <div>Total Revenue: $${stats.total_revenue}</div>
                </div>
                <div style="background: var(--tg-theme-secondary-bg-color); border-radius:12px; padding:16px;">
                    <h3>By Payment Method</h3>
                    ${Object.entries(stats.by_payment).map(([method, count]) => `<div>${method}: ${count}</div>`).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
