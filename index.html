<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bot Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 8px;
            margin-left: -8px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .main-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .toast {
            background: #00a884;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 16px;
            animation: fadeOut 2s ease forwards;
        }
        .toast.error {
            background: #e53935;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        .employee-list {
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .employee-item {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .employee-name {
            flex: 1;
        }
        .delete-btn {
            background: #e53935;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .empty-list {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .transfer-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .transfer-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .arrow {
            font-size: 24px;
            color: var(--tg-theme-hint-color);
        }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header"><div></div><div class="page-title">Control Panel</div><div style="width:32px"></div></div>
        <div class="main-buttons">
            <button class="main-btn" onclick="showPage('addPage')">➕ ADD</button>
            <button class="main-btn" onclick="showPage('employeesPage')">👥 EMPLOYEES</button>
            <button class="main-btn" onclick="openCommissionPage()">💰 COMMISSIONS</button>
            <button class="main-btn" onclick="openGoldSalePage()">🪙 GOLD SALE</button>
            <button class="main-btn" onclick="openTransferPage()">🔄 TRANSFER</button>
        </div>
    </div>

    <div id="addPage" class="hidden">
        <div class="header"><button class="back-btn" onclick="showPage('mainPage')">←</button><div class="page-title">Add Bot Record</div><div style="width:32px"></div></div>
        <form id="addForm">
            <div class="form-group"><label>Kingdom (K)</label><input type="text" id="kingdom" required></div>
            <div class="form-group"><label>Alliance Name</label><input type="text" id="alliance" required></div>
            <div class="form-group"><label>Number of Bots</label><input type="number" id="bots" min="0" required></div>
            <div class="form-group"><label>Price</label><input type="number" id="price" min="0" step="0.01" required></div>
            <div class="form-group"><label>Payment Method</label>
                <select id="payment">
                    <option value="paypal">PayPal</option><option value="russia">Russia</option>
                    <option value="usdt">USDT</option><option value="gold">Gold</option><option value="other">Other</option>
                </select>
            </div>
            <div class="button-group"><button type="button" class="btn btn-secondary" onclick="clearForm('addForm')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
        <div id="addToast"></div>
    </div>

    <div id="employeesPage" class="hidden">
        <div class="header"><button class="back-btn" onclick="showPage('mainPage')">←</button><div class="page-title">Employees</div><div style="width:32px"></div></div>
        <div id="employeesList" class="employee-list"></div>
        <form id="employeeForm">
            <div class="form-group"><label>Add New Employee</label><input type="text" id="employeeName" required autofocus></div>
            <div class="button-group"><button type="button" class="btn btn-secondary" onclick="clearForm('employeeForm')">Clear</button><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
        <div id="employeeToast"></div>
    </div>

    <div id="commissionPage" class="hidden">
        <div class="header"><button class="back-btn" onclick="showPage('mainPage')">←</button><div class="page-title">Commissions</div><div style="width:32px"></div></div>
        <form id="commissionForm">
            <div class="form-group"><label>Employee</label><select id="commissionEmployee"><option value="">Select employee...</option></select></div>
            <div class="form-group"><label>Amount</label><input type="number" id="commissionAmount" min="0" step="0.01" required></div>
            <div class="form-group"><label>Note</label><textarea id="commissionNote"></textarea></div>
            <div class="button-group"><button type="button" class="btn btn-secondary" onclick="clearForm('commissionForm')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
        <div id="commissionToast"></div>
    </div>

    <div id="goldSalePage" class="hidden">
        <div class="header"><button class="back-btn" onclick="showPage('mainPage')">←</button><div class="page-title">Sell Gold</div><div style="width:32px"></div></div>
        <form id="goldSaleForm">
            <div class="form-group"><label>Amount to Sell</label><input type="number" id="goldAmount" min="0" step="1" required></div>
            <div class="form-group"><label>Price (USD)</label><input type="number" id="goldPrice" min="0" step="0.01" required></div>
            <div class="form-group"><label>Payment Method</label>
                <select id="goldPayment">
                    <option value="paypal">PayPal</option><option value="russia">Russia</option>
                    <option value="usdt">USDT</option><option value="other">Other</option>
                </select>
            </div>
            <div class="form-group"><label>Note</label><textarea id="goldNote"></textarea></div>
            <div class="button-group"><button type="button" class="btn btn-secondary" onclick="clearForm('goldSaleForm')">Cancel</button><button type="submit" class="btn btn-primary">Sell</button></div>
        </form>
        <div id="goldToast"></div>
    </div>

    <div id="transferPage" class="hidden">
        <div class="header"><button class="back-btn" onclick="showPage('mainPage')">←</button><div class="page-title">Transfer</div><div style="width:32px"></div></div>
        <form id="transferForm">
            <div class="transfer-row">
                <div class="form-group">
                    <label>From</label>
                    <select id="transferFrom" required>
                        <option value="paypal">PayPal</option>
                        <option value="russia">Russia (RUB)</option>
                        <option value="usdt">USDT</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="arrow">→</div>
                <div class="form-group">
                    <label>To</label>
                    <select id="transferTo" required>
                        <option value="paypal">PayPal</option>
                        <option value="russia">Russia (RUB)</option>
                        <option value="usdt">USDT</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Amount to Transfer</label>
                <input type="number" id="transferAmount" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Converted Amount (Optional - for different currencies)</label>
                <input type="number" id="transferConverted" min="0" step="0.01" placeholder="Leave empty if same currency">
            </div>
            <div class="form-group">
                <label>Note</label>
                <textarea id="transferNote"></textarea>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('transferForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Transfer</button>
            </div>
        </form>
        <div id="transferToast"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        let employees = [];
        
        try {
            employees = JSON.parse(localStorage.getItem('employees') || '[]');
        } catch(e) {}
        
        function saveEmployees() { localStorage.setItem('employees', JSON.stringify(employees)); }
        
        function updateEmployeesList() {
            const container = document.getElementById('employeesList');
            if (!container) return;
            if (employees.length === 0) { container.innerHTML = '<div class="empty-list">📭 No employees yet</div>'; return; }
            let html = '';
            employees.forEach((name, idx) => {
                html += `<div class="employee-item"><span class="employee-name">👤 ${escapeHtml(name)}</span><button class="delete-btn" onclick="deleteEmployee('${escapeHtml(name)}', ${idx})">Delete</button></div>`;
            });
            container.innerHTML = html;
        }
        
        function deleteEmployee(name, idx) {
            if (confirm(`Delete "${name}"?`)) {
                employees.splice(idx, 1);
                saveEmployees();
                updateEmployeesList();
                updateCommissionDropdown();
                tg.sendData(JSON.stringify({ action: 'delete_employee', name: name }));
                showToast('employeeToast', `✅ Deleted "${escapeHtml(name)}"`);
            }
        }
        
        function updateCommissionDropdown() {
            const select = document.getElementById('commissionEmployee');
            if (!select) return;
            if (employees.length === 0) { select.innerHTML = '<option value="">No employees</option>'; return; }
            let opts = '<option value="">Select...</option>';
            employees.forEach(n => { opts += `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`; });
            select.innerHTML = opts;
        }
        
        function showPage(id) {
            ['mainPage','addPage','employeesPage','commissionPage','goldSalePage','transferPage'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'employeesPage') { updateEmployeesList(); setTimeout(() => document.getElementById('employeeName')?.focus(), 100); }
            if (id === 'commissionPage') updateCommissionDropdown();
        }
        
        function openCommissionPage() { showPage('commissionPage'); }
        function openGoldSalePage() { showPage('goldSalePage'); }
        function openTransferPage() { showPage('transferPage'); }
        function clearForm(id) { document.getElementById(id).reset(); }
        function escapeHtml(t) { if(!t)return ''; return t.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        function showToast(containerId, msg, isErr = false) {
            const c = document.getElementById(containerId);
            if (!c) return;
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.className = 'toast' + (isErr ? ' error' : '');
            c.innerHTML = '';
            c.appendChild(toast);
            setTimeout(() => { if (c.firstChild === toast) c.innerHTML = ''; }, 2000);
        }
        
        // Add bot record
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const kingdom = document.getElementById('kingdom').value;
            const alliance = document.getElementById('alliance').value;
            const bots = parseInt(document.getElementById('bots').value);
            const price = parseFloat(document.getElementById('price').value);
            const payment = document.getElementById('payment').value;
            if (!kingdom || !alliance || isNaN(bots) || isNaN(price)) { showToast('addToast', 'Fill all fields', true); return; }
            tg.sendData(JSON.stringify({ action: 'add_bot_record', kingdom, alliance, bots, price, payment }));
            clearForm('addForm');
            tg.close();
        });
        
        // Add employee
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('employeeName').value.trim();
            if (!name) { showToast('employeeToast', 'Enter name', true); return; }
            if (!employees.includes(name)) {
                employees.push(name);
                saveEmployees();
                updateEmployeesList();
                updateCommissionDropdown();
                tg.sendData(JSON.stringify({ action: 'add_employee', name }));
                showToast('employeeToast', `✅ Added "${escapeHtml(name)}"`);
                clearForm('employeeForm');
                document.getElementById('employeeName').focus();
            } else { showToast('employeeToast', `❌ "${name}" exists`, true); }
        });
        
        // Add commission
        document.getElementById('commissionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emp = document.getElementById('commissionEmployee').value;
            const amt = parseFloat(document.getElementById('commissionAmount').value);
            const note = document.getElementById('commissionNote').value;
            if (!emp) { showToast('commissionToast', 'Select employee', true); return; }
            if (!amt || amt <= 0) { showToast('commissionToast', 'Enter amount', true); return; }
            tg.sendData(JSON.stringify({ action: 'add_commission', employee: emp, amount: amt, note }));
            showToast('commissionToast', `✅ Commission for ${escapeHtml(emp)} added`);
            clearForm('commissionForm');
            document.getElementById('commissionEmployee').value = '';
            document.getElementById('commissionAmount').focus();
        });
        
        // Gold Sale
        document.getElementById('goldSaleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseInt(document.getElementById('goldAmount').value);
            const price = parseFloat(document.getElementById('goldPrice').value);
            const payment = document.getElementById('goldPayment').value;
            const note = document.getElementById('goldNote').value;
            
            if (!amount || amount <= 0) {
                showToast('goldToast', 'Please enter a valid amount', true);
                return;
            }
            if (!price || price <= 0) {
                showToast('goldToast', 'Please enter a valid price', true);
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'add_gold_sale',
                amount: amount,
                price: price,
                payment: payment,
                note: note
            }));
            
            showToast('goldToast', `✅ Sold ${amount.toLocaleString()} gold for $${price}`);
            clearForm('goldSaleForm');
        });
        
        // Transfer
        document.getElementById('transferForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fromCurrency = document.getElementById('transferFrom').value;
            const toCurrency = document.getElementById('transferTo').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const convertedAmount = parseFloat(document.getElementById('transferConverted').value);
            const note = document.getElementById('transferNote').value;
            
            if (!amount || amount <= 0) {
                showToast('transferToast', 'Please enter a valid amount', true);
                return;
            }
            
            if (fromCurrency === toCurrency) {
                showToast('transferToast', 'Cannot transfer to same currency', true);
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'add_transfer',
                from_currency: fromCurrency,
                to_currency: toCurrency,
                amount: amount,
                converted_amount: isNaN(convertedAmount) ? null : convertedAmount,
                note: note
            }));
            
            showToast('transferToast', `✅ Transfer from ${fromCurrency} to ${toCurrency} recorded`);
            clearForm('transferForm');
            tg.close();
        });
        
        updateEmployeesList();
        updateCommissionDropdown();
    </script>
</body>
</html>
