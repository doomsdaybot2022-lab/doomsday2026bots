<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Management System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 8px;
            margin-left: -8px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--tg-theme-button-color);
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }
        
        .btn:active {
            opacity: 0.7;
        }
        
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        
        .main-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <!-- Main Menu Page -->
    <div id="mainPage">
        <div class="header">
            <div></div>
            <div class="page-title">Bot Management</div>
            <div style="width: 32px;"></div>
        </div>
        <div class="main-buttons">
            <button class="main-btn" onclick="showPage('addPage')">➕ ADD</button>
            <button class="main-btn" onclick="loadEmployees()">👥 EMPLOYEES</button>
            <button class="main-btn" onclick="showPage('commissionPage')">💰 COMMISSIONS</button>
        </div>
    </div>

    <!-- Add Record Page (Bots) -->
    <div id="addPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Add Bot Record</div>
            <div style="width: 32px;"></div>
        </div>
        
        <form id="addForm">
            <div class="form-group">
                <label>Kingdom (K)</label>
                <input type="text" id="kingdom" placeholder="Enter kingdom name" required>
            </div>
            
            <div class="form-group">
                <label>Alliance Name</label>
                <input type="text" id="alliance" placeholder="Enter alliance name" required>
            </div>
            
            <div class="form-group">
                <label>Number of Bots</label>
                <input type="number" id="bots" placeholder="Enter number of bots" min="0" required>
            </div>
            
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="price" placeholder="Enter price" min="0" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                    <option value="paypal">PayPal</option>
                    <option value="russia">Russia</option>
                    <option value="usdt">USDT</option>
                    <option value="gold">Gold</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('addForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <!-- Employees Page -->
    <div id="employeesPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Employees</div>
            <div style="width: 32px;"></div>
        </div>
        
        <div id="employeesList" style="margin-bottom: 20px;"></div>
        
        <form id="employeeForm">
            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" id="employeeName" placeholder="Enter employee name" required>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('employeeForm')">Clear</button>
                <button type="submit" class="btn btn-primary">Add Employee</button>
            </div>
        </form>
    </div>

    <!-- Commissions Page -->
    <div id="commissionPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Commissions</div>
            <div style="width: 32px;"></div>
        </div>
        
        <form id="commissionForm">
            <div class="form-group">
                <label>Employee</label>
                <select id="commissionEmployee" required>
                    <option value="">Select employee...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Commission Amount</label>
                <input type="number" id="commissionAmount" placeholder="Enter commission amount" min="0" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Note (Optional)</label>
                <textarea id="commissionNote" placeholder="Enter any notes..."></textarea>
            </div>
            
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('commissionForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        function showPage(pageId) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('addPage').classList.add('hidden');
            document.getElementById('employeesPage').classList.add('hidden');
            document.getElementById('commissionPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }
        
        function clearForm(formId) {
            document.getElementById(formId).reset();
        }
        
        function loadEmployees() {
            tg.sendData(JSON.stringify({action: 'get_employees'}));
            showPage('employeesPage');
        }
        
        // Add Bot Record
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                action: 'add_bot_record',
                kingdom: document.getElementById('kingdom').value,
                alliance: document.getElementById('alliance').value,
                bots: parseInt(document.getElementById('bots').value),
                price: parseFloat(document.getElementById('price').value),
                payment: document.getElementById('payment').value
            };
            tg.sendData(JSON.stringify(data));
            clearForm('addForm');
            tg.close();
        });
        
        // Add Employee
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('employeeName').value.trim();
            if (name) {
                tg.sendData(JSON.stringify({
                    action: 'add_employee',
                    name: name
                }));
                clearForm('employeeForm');
                document.getElementById('employeeName').value = '';
                loadEmployees();
            }
        });
        
        // Add Commission
        document.getElementById('commissionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const employee = document.getElementById('commissionEmployee').value;
            const amount = parseFloat(document.getElementById('commissionAmount').value);
            const note = document.getElementById('commissionNote').value;
            
            if (employee && amount) {
                tg.sendData(JSON.stringify({
                    action: 'add_commission',
                    employee: employee,
                    amount: amount,
                    note: note || ''
                }));
                clearForm('commissionForm');
                tg.close();
            }
        });
        
        // Receive data from bot
        window.receiveData = function(data) {
            if (data.type === 'employees_list') {
                displayEmployees(data.content);
            }
        };
        
        function displayEmployees(employees) {
            const container = document.getElementById('employeesList');
            const select = document.getElementById('commissionEmployee');
            
            if (!employees || employees.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color: var(--tg-theme-hint-color);">No employees yet</div>';
                select.innerHTML = '<option value="">No employees available</option>';
                return;
            }
            
            // Display list
            let html = '<div style="margin-bottom: 15px;">';
            employees.forEach(emp => {
                html += `<div style="background: var(--tg-theme-secondary-bg-color); border-radius:8px; padding:10px; margin-bottom:8px;">👤 ${emp.name}</div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            
            // Update dropdown
            let options = '<option value="">Select employee...</option>';
            employees.forEach(emp => {
                options += `<option value="${emp.name}">${emp.name}</option>`;
            });
            select.innerHTML = options;
        }
    </script>
</body>
</html>
