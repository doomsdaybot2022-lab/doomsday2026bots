<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bot Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color);
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--tg-theme-link-color);
            padding: 8px;
            margin-left: -8px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color);
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid var(--tg-theme-hint-color);
        }
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .main-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .toast {
            background: #00a884;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 16px;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header">
            <div></div>
            <div class="page-title">Control Panel</div>
            <div style="width: 32px;"></div>
        </div>
        <div class="main-buttons">
            <button class="main-btn" onclick="showPage('addPage')">➕ ADD</button>
            <button class="main-btn" onclick="showPage('employeesPage')">👥 EMPLOYEES</button>
            <button class="main-btn" onclick="showPage('commissionPage'); loadEmployeesForCommission()">💰 COMMISSIONS</button>
        </div>
    </div>

    <div id="addPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Add Bot Record</div>
            <div style="width: 32px;"></div>
        </div>
        <form id="addForm">
            <div class="form-group">
                <label>Kingdom (K)</label>
                <input type="text" id="kingdom" required>
            </div>
            <div class="form-group">
                <label>Alliance Name</label>
                <input type="text" id="alliance" required>
            </div>
            <div class="form-group">
                <label>Number of Bots</label>
                <input type="number" id="bots" min="0" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="price" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="payment">
                    <option value="paypal">PayPal</option>
                    <option value="russia">Russia</option>
                    <option value="usdt">USDT</option>
                    <option value="gold">Gold</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('addForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="addToast"></div>
    </div>

    <div id="employeesPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Employees</div>
            <div style="width: 32px;"></div>
        </div>
        <div id="employeesList" style="margin-bottom: 20px;"></div>
        <form id="employeeForm">
            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" id="employeeName" required autofocus>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('employeeForm')">Clear</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="employeeToast"></div>
    </div>

    <div id="commissionPage" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showPage('mainPage')">←</button>
            <div class="page-title">Commissions</div>
            <div style="width: 32px;"></div>
        </div>
        <form id="commissionForm">
            <div class="form-group">
                <label>Employee</label>
                <select id="commissionEmployee" required>
                    <option value="">Loading employees...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="commissionAmount" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Note (Optional)</label>
                <textarea id="commissionNote" rows="3"></textarea>
            </div>
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="clearForm('commissionForm')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="commissionToast"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        let employeesList = [];

        function showPage(pageId) {
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('addPage').classList.add('hidden');
            document.getElementById('employeesPage').classList.add('hidden');
            document.getElementById('commissionPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            
            if (pageId === 'employeesPage') {
                loadEmployeesList();
                setTimeout(() => {
                    document.getElementById('employeeName').focus();
                }, 100);
            }
        }
        
        function loadEmployeesList() {
            tg.sendData(JSON.stringify({ action: 'get_employees' }));
        }
        
        function loadEmployeesForCommission() {
            const select = document.getElementById('commissionEmployee');
            select.innerHTML = '<option value="">Loading...</option>';
            tg.sendData(JSON.stringify({ action: 'get_employees' }));
        }
        
        function updateCommissionDropdown(employees) {
            const select = document.getElementById('commissionEmployee');
            if (!employees || employees.length === 0) {
                select.innerHTML = '<option value="">No employees available</option>';
                return;
            }
            let options = '<option value="">Select employee...</option>';
            employees.forEach(name => {
                options += `<option value="${name}">${name}</option>`;
            });
            select.innerHTML = options;
        }
        
        function clearForm(formId) {
            document.getElementById(formId).reset();
        }
        
        function showToast(elementId, message, isError = false) {
            const container = document.getElementById(elementId);
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast';
            if (isError) toast.style.background = '#e53935';
            container.innerHTML = '';
            container.appendChild(toast);
            setTimeout(() => {
                if (container.firstChild === toast) {
                    container.innerHTML = '';
                }
            }, 2000);
        }
        
        // استقبال البيانات من البوت عبر الرسائل
        tg.onEvent('message', function(msg) {
            // نتجاهل الرسائل العادية
            if (typeof msg !== 'string') return;
            
            // نبحث عن البيانات
            if (msg.startsWith('EMPLOYEES_DATA:')) {
                try {
                    const jsonStr = msg.replace('EMPLOYEES_DATA:', '');
                    const data = JSON.parse(jsonStr);
                    if (Array.isArray(data)) {
                        employeesList = data;
                        // تحديث القائمة في صفحة العمولات
                        const commissionPage = document.getElementById('commissionPage');
                        if (commissionPage && !commissionPage.classList.contains('hidden')) {
                            updateCommissionDropdown(employeesList);
                        }
                        // تحديث قائمة الموظفين في صفحة الموظفين
                        const employeesListContainer = document.getElementById('employeesList');
                        if (employeesListContainer) {
                            if (data.length === 0) {
                                employeesListContainer.innerHTML = '<div style="text-align:center; padding:20px; color: var(--tg-theme-hint-color);">No employees yet</div>';
                            } else {
                                let html = '';
                                data.forEach(name => {
                                    html += `<div style="background: var(--tg-theme-secondary-bg-color); border-radius:8px; padding:10px; margin-bottom:8px;">👤 ${name}</div>`;
                                });
                                employeesListContainer.innerHTML = html;
                            }
                        }
                    }
                } catch(e) {
                    console.log('Parse error:', e);
                }
            }
        });
        
        // إضافة بوت
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            tg.sendData(JSON.stringify({
                action: 'add_bot_record',
                kingdom: document.getElementById('kingdom').value,
                alliance: document.getElementById('alliance').value,
                bots: parseInt(document.getElementById('bots').value),
                price: parseFloat(document.getElementById('price').value),
                payment: document.getElementById('payment').value
            }));
            clearForm('addForm');
            tg.close();
        });
        
        // إضافة موظف
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('employeeName').value.trim();
            if (name) {
                tg.sendData(JSON.stringify({ action: 'add_employee', name: name }));
                showToast('employeeToast', `✅ Employee "${name}" added!`);
                clearForm('employeeForm');
                document.getElementById('employeeName').focus();
                // تحديث القائمة بعد الإضافة
                setTimeout(() => {
                    tg.sendData(JSON.stringify({ action: 'get_employees' }));
                }, 500);
            }
        });
        
        // إضافة عمولة
        document.getElementById('commissionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const employee = document.getElementById('commissionEmployee').value;
            const amount = parseFloat(document.getElementById('commissionAmount').value);
            const note = document.getElementById('commissionNote').value;
            
            if (!employee) {
                showToast('commissionToast', 'Please select an employee', true);
                return;
            }
            if (!amount || amount <= 0) {
                showToast('commissionToast', 'Please enter a valid amount', true);
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'add_commission',
                employee: employee,
                amount: amount,
                note: note || ''
            }));
            showToast('commissionToast', `✅ Commission for ${employee} added!`);
            clearForm('commissionForm');
            document.getElementById('commissionAmount').focus();
        });
        
        // تحميل قائمة الموظفين في البداية
        tg.sendData(JSON.stringify({ action: 'get_employees' }));
    </script>
</body>
</html>
