<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Panel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { font-family: Arial; padding: 15px; }
.hidden { display: none; }
.main-btn { display:block; width:100%; margin:10px 0; padding:15px; font-size:18px; }
.form-group { margin-bottom:15px; }
input, select { width:100%; padding:10px; }
</style>
</head>

<body>

<!-- MAIN -->
<div id="mainPage">
    <h2>Control Panel</h2>
    <button class="main-btn" onclick="showPage('addPage')">ADD</button>
    <button class="main-btn" onclick="showPage('employeesPage')">EMPLOYEES</button>
    <button class="main-btn" onclick="showPage('commissionPage')">COMMISSIONS</button>
</div>

<!-- ADD -->
<div id="addPage" class="hidden">
    <button onclick="showPage('mainPage')">Back</button>

    <form id="addForm">
        <div class="form-group">
            <input id="kingdom" placeholder="Kingdom">
        </div>
        <div class="form-group">
            <input id="alliance" placeholder="Alliance">
        </div>
        <div class="form-group">
            <input type="number" id="bots" placeholder="Bots">
        </div>
        <div class="form-group">
            <input type="number" id="price" placeholder="Price">
        </div>
        <div class="form-group">
            <select id="payment">
                <option value="paypal">paypal</option>
                <option value="gold">gold</option>
            </select>
        </div>

        <button type="submit">Save</button>
    </form>
</div>

<!-- EMPLOYEES -->
<div id="employeesPage" class="hidden">
    <button onclick="showPage('mainPage')">Back</button>

    <div id="employeesList"></div>

    <form id="employeeForm">
        <input id="employeeName" placeholder="Employee name">
        <button type="submit">Save</button>
    </form>
</div>

<!-- COMMISSIONS -->
<div id="commissionPage" class="hidden">
    <button onclick="showPage('mainPage')">Back</button>

    <form id="commissionForm">
        <div class="form-group">
            <select id="commissionEmployee"></select>
        </div>

        <div class="form-group">
            <input type="number" id="commissionAmount" placeholder="Amount">
        </div>

        <button type="submit">Save</button>
    </form>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let employees = JSON.parse(localStorage.getItem('employees') || '[]');

function showPage(page){
    ['mainPage','addPage','employeesPage','commissionPage'].forEach(p=>{
        document.getElementById(p).classList.add('hidden');
    });

    document.getElementById(page).classList.remove('hidden');

    if(page === 'commissionPage'){
        loadEmployees();
    }

    if(page === 'employeesPage'){
        renderEmployees();
    }
}

function renderEmployees(){
    let box = document.getElementById('employeesList');
    box.innerHTML = '';
    employees.forEach(e=>{
        box.innerHTML += `<div>${e}</div>`;
    });
}

function loadEmployees(){
    let select = document.getElementById('commissionEmployee');
    select.innerHTML = '';
    employees.forEach(e=>{
        select.innerHTML += `<option value="${e}">${e}</option>`;
    });
}

/* ADD BOT */
document.getElementById('addForm').onsubmit = e=>{
    e.preventDefault();

    tg.sendData(JSON.stringify({
        action:'add_bot_record',
        kingdom:kingdom.value,
        alliance:alliance.value,
        bots:+bots.value,
        price:+price.value,
        payment:payment.value
    }));
};

/* ADD EMPLOYEE */
document.getElementById('employeeForm').onsubmit = e=>{
    e.preventDefault();

    let name = employeeName.value.trim();

    if(!employees.includes(name)){
        employees.push(name);
        localStorage.setItem('employees', JSON.stringify(employees));

        tg.sendData(JSON.stringify({
            action:'add_employee',
            name:name
        }));

        renderEmployees();
    }
};

/* ADD COMMISSION */
document.getElementById('commissionForm').onsubmit = e=>{
    e.preventDefault();

    tg.sendData(JSON.stringify({
        action:'add_commission',
        employee:commissionEmployee.value,
        amount:+commissionAmount.value
    }));
};
</script>

</body>
</html>
